# Networks
networks:
  wordpressnet:

services:
  wordpress:
    # container_name: wordpress
    # image: wordpress:latest
    volumes:
      #Volumes provide the ability to connect specific filesystem paths of the container back to the host machine.
      - ./public/wp-content:/var/www/html/wp-content
      # whr.json also needs to be accessible in the same folder as vendor
      - ./whr.json:/var/www/whr.json
      # tmp folder (necessary for wp cli db imports) - see DOCKER_TMP_VOLUME in settings.json
      - ./Docker/data/tmp:/tmp/Docker
    build:
      context: .
      dockerfile: ./vendor/aslamhus/wordpress-hmr/wordpress.Dockerfile
    # context: ./

    environment:
      WORDPRESS_DB_NAME: wp_database
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: admin
      WORDPRESS_DB_PASSWORD: password
      WORDPRESS_DEBUG: true
      WORDPRESS_CONFIG_EXTRA: |
        /* Remove https for admin */
        define('FORCE_SSL_ADMIN', false );
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY',true);
        ini_set('display_errors', true);
        ini_set('display_startup_errors', true);
        error_reporting(E_ALL);

    depends_on:
      - db
      - phpmyadmin
    restart: always
    ports:
      - ${WHR_PORT}:80
    networks:
      - wordpressnet

  db:
    image: mariadb:latest
    # container_name: db
    restart: always
    volumes:
      - db_data:/var/lib/mysql
      # - ./Docker/data/dump.sql:/docker-entrypoint-initdb.d/dump.sql

    environment:
      MYSQL_USER: admin
      MYSQL_ROOT_PASSWORD: password
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: wp_database
    networks:
      - wordpressnet

  phpmyadmin:
    image: arm64v8/phpmyadmin
    # restart: always
    ports:
      - 8180:80
    environment:
      PMA_HOST: db
    networks:
      - wordpressnet
    depends_on:
      - db

  wpcli:
    # container_name: wpcli
    working_dir: /var/www/html
    restart: always
    image: wordpress:cli
    stdin_open: true
    tty: true
    environment:
      - WORDPRESS_DB_NAME=wp_database
      - WORDPRESS_TABLE_PREFIX=wp_
      - WORDPRESS_DB_HOST=db
      - WORDPRESS_DB_USER=admin
      - WORDPRESS_DB_PASSWORD=password
    depends_on:
      - db
      - wordpress
    entrypoint: ["wp"]
    volumes_from:
      - wordpress
    networks:
      - wordpressnet

volumes:
  db_data:
